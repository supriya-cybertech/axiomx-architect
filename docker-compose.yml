version: '3.8'
services:
  frontend:
    build:
      context: ./axiom-frontend
    ports:
      - "3000:3000"
  backend:
    build:
      context: ./axiom-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/axiom
      - REDIS_URL=redis://redis:6379/0
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=axiom
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
